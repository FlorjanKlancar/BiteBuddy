services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bitebuddy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bitebuddy}
      POSTGRES_DB: ${POSTGRES_DB:-bitebuddy}
    ports:
      - "${PORT_DB:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bitebuddy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bitebuddy}:${POSTGRES_PASSWORD:-bitebuddy}@postgres:5432/${POSTGRES_DB:-bitebuddy}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["bun", "run", "src/db/migrate.ts"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${PORT_API:-3001}:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bitebuddy}:${POSTGRES_PASSWORD:-bitebuddy}@postgres:5432/${POSTGRES_DB:-bitebuddy}
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${PORT_WEB:-3000}:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${PORT_API:-3001}
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
