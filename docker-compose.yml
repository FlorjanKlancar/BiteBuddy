services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bitebuddy
      POSTGRES_PASSWORD: bitebuddy
      POSTGRES_DB: bitebuddy
    ports:
      - "${PORT_DB:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitebuddy"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${PORT_API:-3001}:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://bitebuddy:bitebuddy@postgres:5432/bitebuddy
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${PORT_WEB:-3000}:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${PORT_API:-3001}
    depends_on:
      - api

volumes:
  postgres_data:
